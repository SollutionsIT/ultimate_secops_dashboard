name: SecOps Dashboard CI

# Run checks on every push to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-and-quality:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout repository to the GitHub server
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Set up Python
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    # 3. Install testing tools and dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 bandit
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Check for fatal syntax errors
    - name: Lint with Flake8
      run: |
        # Stop the build if there are syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    # 5. Code Security Scan (SAST)
    - name: Security Scan with Bandit
      run: |
        # Search for potential vulnerabilities in Python code
        bandit -r . -ll -ii